                    });
                    // --------------------------------------------------------

                    setShowTrailerModal(false);
                    setScanInput('');
                    playSound('success');
                }
            };

            const manualTrailerSwitch = () => {
                setShowTrailerModal(true);
            };

            const toggleDayLock = () => {
                const key = getCurrentTrailerKey();
                const currentStatus = trailerState[key]?.locked || false;
                db.ref(`trailerState/${key}`).update({ 
                    locked: !currentStatus 
                });
                playSound('info');
            };

            const toISODate = (d) => {
                 const z = n => ('0' + n).slice(-2);
                 return d.getFullYear() + '-' + z(d.getMonth()+1) + '-' + z(d.getDate());
            };

            const isDateSkipped = (date, country) => {
                const dateString = toISODate(date);
                if (date.getDay() === 0 || date.getDay() === 6) return true;
                const countrySkips = skipDates[country] || [];
                return countrySkips.includes(dateString);
            };

            const getNextLogisticalDay = (country) => {
                let d = new Date();
                d.setDate(d.getDate() + 1); 
                while (isDateSkipped(d, country)) {
                    d.setDate(d.getDate() + 1);
                }
                return d;
            };

            const getDeliveryDateByBatch = (store, batchIndex) => {
                if (store.country === 'NL') {
                      const today = new Date();
                      const day = String(today.getDate()).padStart(2, '0');
                      const month = String(today.getMonth() + 1).padStart(2, '0');
                      return { dateObj: today, dateString: `${day}-${month} (Dagbestand)`, dayName: 'NL' };
                }

                const hasSchedule = store.MA || store.DI || store.WO || store.DO || store.VR || store.ZA || store.ZO;
                
                if (!hasSchedule) {
                     let checkDate = getNextLogisticalDay(store.country);
                     const day = String(checkDate.getDate()).padStart(2, '0');
                     const month = String(checkDate.getMonth() + 1).padStart(2, '0');
                     const daysMap = ['ZO', 'MA', 'DI', 'WO', 'DO', 'VR', 'ZA'];
                     return { dateObj: checkDate, dateString: `${day}-${month} (Lijst)`, dayName: daysMap[checkDate.getDay()] };
                }

                const daysMap = ['ZO', 'MA', 'DI', 'WO', 'DO', 'VR', 'ZA'];
                let checkDate = getNextLogisticalDay(store.country);
                let validDaysFound = 0;
                for (let i = 0; i < 60; i++) {
                    if (isDateSkipped(checkDate, store.country)) {
                        checkDate.setDate(checkDate.getDate() + 1);
                        continue;
                    }
                    const dayIndex = checkDate.getDay();
                    const dayKey = daysMap[dayIndex];
                    if (store[dayKey] && store[dayKey].trim() !== "") {
                        if (validDaysFound === batchIndex) {
                            return { dateObj: new Date(checkDate), dateString: checkDate.toLocaleDateString('nl-NL'), dayName: dayKey };
                        }
                        validDaysFound++;
                    }
                    checkDate.setDate(checkDate.getDate() + 1);
                }
                const fallback = new Date();
                return { dateObj: fallback, dateString: fallback.toLocaleDateString('nl-NL'), dayName: daysMap[fallback.getDay()] };
            };

            const addHoliday = () => {
                const val = document.getElementById('holidayInput').value;
                if(val) {
                    setSkipDates(prev => {
                        const currentList = prev[settingsCountry] || [];
                        if(!currentList.includes(val)) {
                            return { ...prev, [settingsCountry]: [...currentList, val].sort() };
                        }
                        return prev;
                    });
                    document.getElementById('holidayInput').value = '';
                }
            };

            const removeHoliday = (dateToRemove) => {
                setSkipDates(prev => ({
                    ...prev,
                    [settingsCountry]: prev[settingsCountry].filter(d => d !== dateToRemove)
                }));
            };

            const extract210Barcodes = (text) => {
                if (!text) return [];
                let cleaned = text.replace(/\]C\d/g, ' ').replace(/['";,]/g, ' ');
                cleaned = cleaned.replace(/\s+/g, ' ');
                const matches = cleaned.match(/\b210\d{3,}\b/g);
                return matches ? Array.from(new Set(matches)) : [];
            };

            const handleBarcodePasteProcess = () => {
                const raw = (barcodePasteText || '').trim();
                
                if (!raw) {
                    playSound('error');
                    showAlert("Het tekstvak is leeg. Plak eerst de barcodes.", "Leeg");
                    return;
                }

                const extracted = extract210Barcodes(raw);
                
                if (extracted.length === 0) {
                    playSound('error');
                    showAlert("Geen '210' barcodes gevonden in de tekst.\nControleer of de nummers beginnen met 210.", "Geen resultaat");
                    return;
                }

                const MAX_LINES_LIMIT = 3000;
                if (extracted.length > MAX_LINES_LIMIT) {
                    showAlert(`Te veel barcodes! Maximaal ${MAX_LINES_LIMIT} per keer.`, "Limiet");
                    return;
                }

                setShowBarcodePasteModal(false);
                setBarcodePasteText('');
                processImportData(extracted, activeCountry);
            };

            const processImportData = (validBarcodes, targetCountry) => {
                const hasExisting = scanHistory.some(i => i.country === targetCountry && (targetCountry === 'NL' ? i.depot === activeDepot : true));
                if (hasExisting) {
                    setImportDecision({ open: true, barcodes: validBarcodes, targetCountry });
                } else {
                    executeImport(validBarcodes, true, targetCountry);
                }
            };

            const executeImport = (validBarcodes, shouldClear, targetCountry) => {
                try {
                    const country = targetCountry || activeCountry;
                    const trailerKey = getCurrentTrailerKey();
                    const currentStats = trailerState[trailerKey] || { number: 1, count: 0 };
                    
                    let currentTrailerNr = shouldClear ? 1 : currentStats.number;
                    let currentCountInTrailer = shouldClear ? 0 : currentStats.count;
                    
                    if (shouldClear) {
                        db.ref(`trailerState/${trailerKey}`).set({ number: 1, count: 0 });
                        
                        const updates = {};
                        scanHistory.forEach(item => {
                            if (item.country === country && (country === 'NL' ? item.depot === activeDepot : true) && item.status !== STATUS_BUFFER) {
                                updates[item.id] = null; 
                            }
                        });
                        if (Object.keys(updates).length > 0) db.ref('scanHistory').update(updates);
                    }
                    
                    let addedCount = 0;
                    let skippedBarcodes = [];
                    const updates = {}; 
                    const timestampBase = new Date();

                    validBarcodes.forEach((code, index) => {
                        let targetId = code.substring(3, 6); 
                        const formattedId = targetId.padStart(3, '0');
                        
                        let store = database.find(s => s.id === formattedId && s.country === country);
                        
                        if (store) {
                            if (country === 'NL' && store.depot && store.depot !== activeDepot) {
                                // Wel gevonden, maar verkeerd depot
                                skippedBarcodes.push(`${code} (Verkeerd depot: ${store.depot})`);
                                return;
                            }

                            let existingLog = null;
                            if (!shouldClear) {
                                existingLog = scanHistory.find(h => h.barcode === code);
                                // Alleen afwijzen als hij in de historie zit en NIET in de buffer staat
                                if (existingLog && existingLog.status !== 'STATUS_BUFFER') {
                                    const loc = existingLog.country + (existingLog.depot ? `-${existingLog.depot}` : '');
                                    skippedBarcodes.push(`${code} (Zit al in Historie van ${loc})`);
                                    return;
                                }
                            }

                            currentCountInTrailer++;
                            if (currentCountInTrailer > trailerLimit) {
                                currentTrailerNr++;
                                currentCountInTrailer = 1;
                            }

                            // Als het item uit de buffer komt, gebruiken we hetzelfde ID om hem te overschrijven, 
                            // anders maken we een nieuw ID aan voor een verse scan.
                            const uniqueId = (existingLog && existingLog.status === 'STATUS_BUFFER') 
                                ? existingLog.id 
                                : (Date.now() + index + Math.random()).toString().replace('.', '_');
                            
                            const newItem = {
                                id: uniqueId,
                                timestamp: timestampBase.toLocaleTimeString(),
                                storeId: store.id,
                                storeName: store.naam,
                                route: store.route,
                                barcode: code,
                                status: 'STATUS_GELADEN', 
                                deliveryDate: 'IMPORT',
                                trailerNr: currentTrailerNr,
                                country: store.country,
                                depot: (store.country === 'NL' ? activeDepot : ''),
                                source: locationMode,
                                dock: activeDock
                            };

                            updates[uniqueId] = newItem;
                            addedCount++;
                        } else {
                            // Filiaal ID is onbekend
                            skippedBarcodes.push(`${code} (Onbekend filiaal: ${formattedId})`);
                        }
                    });

                    if (Object.keys(updates).length > 0) {
                        db.ref('scanHistory').update(updates);
                    }

                    db.ref(`trailerState/${trailerKey}`).set({
                        number: currentTrailerNr,
                        count: currentCountInTrailer
                    });

                    setImportDecision({ open: false, barcodes: [], targetCountry: null });
                    
                    playSound('success');
                    
                    let msg = `Klaar! ${addedCount} barcodes geïmporteerd voor ${country}.`;
                    
                    if (skippedBarcodes.length > 0) {
                        msg += `\n\n⚠️ Er zijn ${skippedBarcodes.length} barcodes overgeslagen:\n`;
                        const limit = 15;
                        msg += skippedBarcodes.slice(0, limit).join('\n');
                        if (skippedBarcodes.length > limit) {
                            msg += `\n... en nog ${skippedBarcodes.length - limit} andere.`;
                        }
                    }
                    
                    showAlert(msg, "Import Voltooid");

                } catch (error) {
                    console.error(error);
                    playSound('error');
                    showAlert("Er ging iets mis tijdens de import:\n" + error.message, "Fout");
                }
            };

            const clearDatabase = () => {
                let label = "deze selectie";
                if(importMode === 'BE') label = "alle BE filialen";
                if(importMode === 'NL_TLB') label = "alle TLB filialen";
                if(importMode === 'NL_BKR') label = "alle BKR filialen";

                if(!window.confirm(`LET OP: Je staat op het punt om ${label} DEFINITIEF te verwijderen uit de filiaal-database.\n\nWeet je het zeker?`)) return;

                const newDB = database.filter(store => {
                    if(importMode === 'BE') return store.country !== 'BE';
                    if(importMode === 'NL_TLB') return !(store.country === 'NL' && store.depot === 'TLB');
                    if(importMode === 'NL_BKR') return !(store.country === 'NL' && store.depot === 'BKR');
                    return true;
                });

                setDatabase(newDB);
                db.ref('stores').set(newDB);
                
                playSound('info');
                showAlert(`${label} zijn gewist. Je kunt nu een nieuwe lijst importeren.`, "Database Opgeschoond");
            };

            const handlePasteImport = () => {
                if (!pasteData.trim()) return;
                const rows = pasteData.trim().split('\n');
                
                let newDB = [...database];
                
                if (importMode === 'BE') {
                    newDB = newDB.filter(s => s.country !== 'BE');
                } else if (importMode === 'NL_TLB') {
                    newDB = newDB.filter(s => !(s.country === 'NL' && s.depot === 'TLB'));
                } else if (importMode === 'NL_BKR') {
                    newDB = newDB.filter(s => !(s.country === 'NL' && s.depot === 'BKR'));
                }

                let successCount = 0;
                const firstLine = rows[0];
                let delimiter = '\t'; 
                if (firstLine.includes(';') && !firstLine.includes('\t')) delimiter = ';';
                else if (firstLine.includes(',') && !firstLine.includes('\t')) delimiter = ',';

                const headers = firstLine.split(delimiter).map(h => h.trim().toLowerCase());
                let maxIndex = headers.findIndex(h => h.includes('max') || h.includes('aantal'));
                if (maxIndex === -1) maxIndex = 13; 
                
                let startIndex = 0;
                if (headers.some(h => h.includes('route') || h.includes('id') || h.includes('naam'))) {
                    startIndex = 1;
                }

                for (let i = startIndex; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    const cols = rows[i].split(delimiter);
                    if (cols.length < 2) continue;

                    const clean = (val) => val ? val.replace(/['"]+/g, '').trim() : "";
                    let store = {};

                    if (importMode === 'BE') {
                        let idVal = clean(cols[0]);
                        if (idVal) { idVal = idVal.padStart(3, '0'); }

                        let nameVal = clean(cols[1]);
                        let maxVal = 100;
                        if (cols[2]) {
                            const parsed = parseInt(clean(cols[2]));
                            if (!isNaN(parsed) && parsed > 0) maxVal = parsed;
                        } else {
                             maxVal = 100; 
                        }
                        
                        store = {
                            country: 'BE',
                            route: 'BE', 
                            id: idVal,
                            naam: nameVal,
                            max: maxVal,
                            MA:'', DI:'', WO:'', DO:'', VR:'', ZA:'', ZO:'' 
                        };
                    } else {
                        let idVal = clean(cols[0]);
                        if (idVal) { idVal = idVal.padStart(3, '0'); }

                        let nameVal = clean(cols[1]);
                        let maxVal = 500; 
                        if (cols[2]) {
                            const parsed = parseInt(clean(cols[2]));
                            if (!isNaN(parsed) && parsed > 0) maxVal = parsed;
                        }
                        
                        const depotName = importMode === 'NL_TLB' ? 'TLB' : 'BKR';
                        
                        store = {
                            country: 'NL',
                            depot: depotName, 
                            id: idVal,
                            route: depotName,
                            naam: nameVal,
                            max: maxVal,
                            MA:'', DI:'', WO:'', DO:'', VR:'', ZA:'', ZO:'' 
                        };
                    }

                    if (store.id && !isNaN(parseInt(store.id))) {
                        newDB.push(store);
                        successCount++;
                    }
                }

                if (successCount > 0) {
                    setDatabase(newDB); 
                    db.ref('stores').set(newDB);
                    setShowImport(false); 
                    setPasteData("");
                    if(importMode.startsWith('NL')) setActiveCountry('NL');
                    showAlert(`Succes! ${successCount} filialen voor ${importMode} geïmporteerd.`, "Import Voltooid");
                } else { 
                    showAlert("Geen geldige regels gevonden.", "Fout"); 
                }
            };

            const handleManualAddSubmit = (e) => {
                e.preventDefault();
                if (!manualInput) return;

                const rawInputs = manualInput.split(/[\n\r\t, ]+/).filter(s => s.trim().length > 0);
                if (rawInputs.length === 0) return;

                let successCount = 0;
                let errorLog = [];
                
                rawInputs.forEach(rawToken => {
                    let token = rawToken.trim();
                    if (token.startsWith("]C0")) token = token.substring(3);
                    
                    let targetId = null;
                    let isBarcode = false;

                    if (token.startsWith("210") && token.length >= 6) {
                        targetId = token.substring(3, 6);
                        isBarcode = true;
                    } else if (!isNaN(parseInt(token)) && token.length <= 4) {
                        targetId = token;
                        isBarcode = false;
                    }

                    if (!targetId) {
                        errorLog.push(`${token}: Ongeldig formaat`);
                        return;
                    }

                    const formattedId = targetId.padStart(3, '0');
                    let store = database.find(s => s.id === formattedId && s.country === activeCountry);

                    if (!store) {
                        errorLog.push(`${token}: Onbekend filiaal`);
                        return;
                    }

                    if (isBarcode && scanHistory.some(log => log.barcode === token)) {
                        errorLog.push(`${token}: Al gescand`);
                        return;
                    }

                    if (!isBarcode) {
                        token = `HANDMATIG-${formattedId}-${Date.now()}-${Math.random()}`;
                    }

                    const currentCount = scanHistory.filter(item => item.storeId === store.id && item.country === store.country && isCountableForCapacity(item.status)).length;
                    const batchIndex = Math.floor(currentCount / (store.max || 1));
                    const deliveryInfo = getDeliveryDateByBatch(store, batchIndex);
                        
                    addToHistory(store, STATUS_HANDMATIG, token, deliveryInfo, 'REST');
                    successCount++;
                });

                setManualInput('');
                setShowManualModal(false);

                if (successCount > 0) {
                    playSound('success');
                    showAlert(`${successCount} restanten toegevoegd.`, "Restanten Verwerkt");
                } else if (errorLog.length > 0) {
                    playSound('error');
                    showAlert(`Fouten:\n${errorLog.slice(0,5).join('\n')}`, "Fout");
                }
            };

            const handleScan = (e) => {
                e.preventDefault();
                if (!scanInput) return;

                let rawInput = scanInput.trim();
                if (rawInput.startsWith("]C0")) rawInput = rawInput.substring(3);

                let targetId = null;
                
                if (rawInput.startsWith("210") && rawInput.length >= 6) {
                    targetId = rawInput.substring(3, 6);
                } 
                else if (!isNaN(parseInt(rawInput)) && rawInput.length <= 4) {
                     targetId = rawInput;
                }
                else {
                    setScanResult({ type: 'unknown', store: { id: '---', naam: 'Ongeldig' }, msg: 'Alleen 210 barcodes!' });
                    playSound('error');
                    setScanInput('');
                    return;
                }

                const scannedBarcode = rawInput;
                const existingScan = scanHistory.find(log => log.barcode === scannedBarcode);

                if (existingScan && existingScan.status !== STATUS_BUFFER) {
                    const tempId = targetId.padStart(3, '0');
                    const tempStore = database.find(s => s.id === tempId && s.country === activeCountry) || { id: tempId, naam: 'Onbekend' };
                    
                    setScanResult({ 
                        type: 'warning-duplicate', 
                        store: tempStore, 
                        msg: 'REEDS GESCAND', 
                        bufferMsg: 'Zit al in de trailer!', 
                        quantityMsg: 'Niet opgeslagen' 
                    });
                    playSound('error');
                    speak("Let op. Dubbele scan.");
                    setScanInput('');
                    return;
                }

                const formattedId = targetId.padStart(3, '0');
                
                let store = database.find(s => 
                    s.id === formattedId && 
                    s.country === activeCountry && 
                    (activeCountry === 'NL' ? s.depot === activeDepot : true)
                );

                if (!store) {
                    let wrongDepotStore = null;
                    if (activeCountry === 'NL') {
                        wrongDepotStore = database.find(s => s.id === formattedId && s.country === 'NL');
                    }

                    if (wrongDepotStore) {
                        setScanResult({ 
                            type: 'warning-delivery',
                            store: wrongDepotStore, 
                            msg: 'VERKEERD DEPOT', 
                            bufferMsg: `Dit is voor ${wrongDepotStore.depot}. Hier is ${activeDepot}.`, 
                            quantityMsg: 'NIET GESCAND', 
                            isCheckMode: false 
                        });
                        playSound('error');
                        speak(`Fout. Dit is voor ${wrongDepotStore.depot}.`);
                        setScanInput('');
                        return;
                    } 
                    
                    if (rawInput.startsWith("210")) {
                        const unknownStore = { 
                            id: formattedId, 
                            naam: `Onbekend (${formattedId})`, 
                            country: activeCountry, 
                            depot: activeCountry === 'NL' ? activeDepot : '', 
                            route: '?', 
                            max: 0 
                        };
                        
                        addToHistory(unknownStore, STATUS_BUFFER, scannedBarcode, { dayName: 'ONBEKEND', dateString: 'BUFFER' }, 'BUF');
                        
                        setScanResult({ 
                            type: 'warning-max',
                            store: unknownStore, 
                            msg: 'ONBEKEND -> BUFFER', 
                            bufferMsg: 'Filiaal niet in lijst. In buffer gezet.', 
                            quantityMsg: 'Opgeslagen als onbekend', 
                            isCheckMode: false 
                        });
                        
                        playSound('alert');
                        speak("Onbekend. In buffer."); 
                        setScanInput('');
                        return;
                    } else {
                        setScanResult({ type: 'unknown', store: { id: formattedId, naam: 'Onbekend' }, msg: 'Ongeldige Invoer' });
                        playSound('error');
                        setScanInput('');
                        return;
                    }
                }

                if (activeCountry === 'NL') {
                    if (store.depot && store.depot !== activeDepot) {
                        setScanResult({ type: 'warning-delivery', store: store, msg: `VERKEERD DEPOT`, bufferMsg: `Dit is voor ${store.depot}. Hier is ${activeDepot}.`, quantityMsg: 'NIET GESCAND', isCheckMode: false });
                        playSound('error');
                        speak(`Fout. Verkeerd depot.`);
                        setScanInput('');
                        return; 
                    }
                }

                let currentCount = scanHistory.filter(item => item.storeId === store.id && item.country === store.country && isCountableForCapacity(item.status)).length;
                let batchIndex = Math.floor(currentCount / (store.max || 1));
                let deliveryInfo = getDeliveryDateByBatch(store, batchIndex);
                
                const currentLockKey = getCurrentTrailerKey();
                const isDayLockedNow = trailerState[currentLockKey]?.locked || false;

                let statusType = 'success';
                let statusMsg = 'OK - OPGESLAGEN';
                let bufferMsg = '';
                let shouldSaveToBuffer = false;

                if (isDayLockedNow) {
                    statusType = 'warning-max'; statusMsg = 'DAG GESLOTEN -> BUFFER'; bufferMsg = 'Trailer is afgesloten.'; shouldSaveToBuffer = true;
                } else if (store.blocked) {
                    statusType = 'warning-max'; statusMsg = 'GEBLOKKEERD -> BUFFER'; bufferMsg = 'Filiaal geblokkeerd.'; shouldSaveToBuffer = true;
                    speak("Geblokkeerd. In buffer.");
                } else {
                    const newTotal = currentCount + 1;
                    if (newTotal > store.max) {
                         statusType = 'warning-max'; statusMsg = 'VOL -> BUFFER'; bufferMsg = `Max (${store.max}) bereikt.`; shouldSaveToBuffer = true;
                         speak("Filiaal vol. In buffer.");
                    }
                    else if (store.country === 'BE') {
                         const nextLogisticalDay = getNextLogisticalDay('BE');
                         const isNext = deliveryInfo.dateObj.getDate() === nextLogisticalDay.getDate();
                         if (!isNext) {
                             statusType = 'warning-delivery'; statusMsg = 'VERKEERDE DAG -> BUFFER'; bufferMsg = `Levering pas: ${deliveryInfo.dayName}`; shouldSaveToBuffer = true;
                             speak("Verkeerde dag. In buffer.");
                         }
                    }
                }

                const newTotal = currentCount + 1;
                const isSingle = !store.blocked && newTotal === 1;
                const isMax = newTotal >= store.max;
                const pct = Math.min((newTotal / (store.max || 1)) * 100, 100);
                const trailerMsg = (trailerState[currentLockKey]?.count || 0) >= trailerLimit ? "TRAILER VOL!" : "";

                if (shouldSaveToBuffer) {
                    if (!existingScan) { 
                        addToHistory(store, STATUS_BUFFER, scannedBarcode, deliveryInfo, 'BUF'); 
                    }
                    setScanResult({ 
                        type: statusType, 
                        store, 
                        barcode: scannedBarcode, 
                        deliveryInfo, 
                        msg: statusMsg, 
                        bufferMsg, 
                        quantityMsg: `Totaal: ${newTotal}`, 
                        isSingle: false, 
                        newTotal, trailerMsg, pct, isMax: true 
                    });
                    
                    if(!store.blocked && !isDayLockedNow) playSound('alert'); 
                } else {
                    if (existingScan && existingScan.status === STATUS_BUFFER) {
                        db.ref('scanHistory/' + existingScan.id).update({ 
                            status: STATUS_GELADEN, 
                            dock: activeDock, 
                            timestamp: new Date().toLocaleTimeString(),
                            trailerNr: trailerStats.number,
                            storeName: store.naam,
                            route: store.route,
                            source: locationMode,
                            depot: (activeCountry === 'NL' ? activeDepot : '')
                        });

                        const key = getCurrentTrailerKey();
                        db.ref(`trailerState/${key}/count`).transaction((c) => (c || 0) + 1);
                        statusMsg = "GELADEN (UIT BUFFER)";
                    } else {
                        addToHistory(store, STATUS_GELADEN, scannedBarcode, deliveryInfo, trailerStats.number);
                    }

                    playSound('success');
                    
                    if (isSingle) speak(`Start ${store.naam}.`);
                    else if (isMax) speak(`Oké. ${store.naam} is vol.`);
                    else speak(`Oké. ${store.naam}.`);

                    setScanResult({ 
                        type: 'success', 
                        store, 
                        barcode: scannedBarcode, 
                        deliveryInfo, 
                        msg: statusMsg, 
                        bufferMsg: '', 
                        quantityMsg: `AANTAL OK: ${newTotal}`, 
                        isSingle, 
                        newTotal, 
                        trailerMsg, 
                        pct, 
                        isMax 
                    });
                }

                setScanInput('');
            };

            const addToHistory = (store, status, barcode, deliveryInfo, trailerNr) => {
                if (status === STATUS_BUFFER) {
                    const alreadyInBuffer = scanHistory.find(item => 
                        item.barcode === barcode && item.status === STATUS_BUFFER
                    );
                    if (alreadyInBuffer) return; 
                }

                const safeTrailerNr = (trailerNr !== undefined && trailerNr !== null) ? trailerNr : 1;
                const finalLocation = (locationMode === 'EXTERN') ? 'EXTERN' : 'MAIN';

                const newLog = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleTimeString(),
                    dock: activeDock,
                    storeId: store.id,
                    storeName: store.naam,
                    route: store.route || '?',
                    barcode: barcode || '-',
                    status: status,
                    deliveryDate: `${deliveryInfo.dayName} ${deliveryInfo.dateString}`,
                    trailerNr: safeTrailerNr,
                    country: store.country,
                    depot: store.depot || (store.country === 'NL' ? activeDepot : ''),
                    source: finalLocation 
                };

                db.ref('scanHistory/' + newLog.id).set(newLog);

                if ((status === STATUS_GELADEN || status === STATUS_HANDMATIG) && safeTrailerNr !== 'REST') {
                    const key = getCurrentTrailerKey(); 
                    db.ref(`trailerState/${key}/count`).transaction((current) => (current || 0) + 1);
                }
            };

            const deleteLog = (id) => {
                const itemToDelete = scanHistory.find(i => i.id === id);
                if (!itemToDelete) return;

                showConfirm("Weet u zeker dat u deze scan wilt verwijderen uit de Cloud database?", () => {
                    db.ref('scanHistory/' + id).remove();

                    if (isVisibleStatus(itemToDelete.status)) {
                        let trailerKey = "";
                        const isExtern = itemToDelete.source === 'EXTERN';
                        
                        if (isExtern) {
                            trailerKey = `EXT_${itemToDelete.country}_DOCK_UNIVERSEEL`;
                        } else {
                            const dockNr = itemToDelete.dock || activeDock; 
                            trailerKey = (itemToDelete.country === 'BE') ? `BE_${dockNr}` : `NL_DOCK_${dockNr}`;
                        }
                        
                        db.ref(`trailerState/${trailerKey}/count`).transaction((currentCount) => {
                            return Math.max(0, (currentCount || 0) - 1);
                        });
                    }
                    
                    if(scanResult && scanResult.barcode === itemToDelete.barcode) {
                        setScanResult(null);
                    }
                    
                    playSound('info');
                }, "Scan Verwijderen", "Verwijderen");
            };

            const getDailyStats = () => {
                const stats = {};

                database.forEach(store => {
                    if (store.country !== activeCountry) return;
                    if (activeCountry === 'NL' && store.depot && store.depot !== activeDepot) return;

                    stats[store.id] = { 
                        store, 
                        total: 0, 
                        onderweg: 0, 
                        buffer: 0, 
                        docks: {}, 
                        barcodes: [] 
                    };
                });

                scanHistory.forEach(log => {
                    if (log.country !== activeCountry) return;
                    if (activeCountry === 'NL' && log.depot !== activeDepot) return;

                    if (!stats[log.storeId]) {
                        stats[log.storeId] = {
                            store: {
                                id: log.storeId,
                                naam: log.storeName || 'Onbekend',
                                route: log.route || '?',
                                country: log.country,
                                max: 0
                            },
                            total: 0,
                            onderweg: 0,
                            buffer: 0,
                            docks: {},
                            barcodes: []
                        };
                    }

                    const currentStore = stats[log.storeId];

                    if (isVisibleStatus(log.status)) {
                        currentStore.total += 1;
                    } 
                    else if (log.status === STATUS_ONDERWEG) {
                        const isAlGeladen = scanHistory.some(item => 
                            item.barcode === log.barcode && isVisibleStatus(item.status)
                        );

                        if (!isAlGeladen) {
                            currentStore.onderweg += 1;
                            const dName = log.dock || '??';
                            currentStore.docks[dName] = (currentStore.docks[dName] || 0) + 1;
                        }
                    } 
                    else if (log.status === STATUS_BUFFER) {
                        currentStore.buffer += 1;
                    }

                    if(log.barcode && log.barcode !== '-') {
                        currentStore.barcodes.push({code: log.barcode, status: log.status});
                    }
                });

                return Object.values(stats).sort((a, b) => {
                    const idA = parseInt(a.store.id);
                    const idB = parseInt(b.store.id);
                    if (!isNaN(idA) && !isNaN(idB)) return idA - idB;
                    return a.store.id.localeCompare(b.store.id);
                });
            };

            const getFullStores = () => {
                const counts = {};
                scanHistory.forEach(log => {
                    if (log.country !== activeCountry) return;
                    if (activeCountry === 'NL' && log.depot !== activeDepot) return;

                    if(isVisibleStatus(log.status)) {
                        counts[log.storeId] = (counts[log.storeId] || 0) + 1; 
                    }
                });
                const fullStoreIds = Object.keys(counts).filter(id => {
                    const store = database.find(s => s.id === id && s.country === activeCountry);
                    return store && counts[id] >= store.max;
                });
                return fullStoreIds.map(id => {
                    const store = database.find(s => s.id === id && s.country === activeCountry);
                    return { id, naam: store.naam, count: counts[id], max: store.max };
                }).sort((a, b) => parseInt(a.id) - parseInt(b.id));
            };

            const getIncompleteStores = () => {
                const counts = {};
                scanHistory.forEach(log => { 
                    if (log.country !== activeCountry) return;
                    if (activeCountry === 'NL' && log.depot !== activeDepot) return;

                    if(isVisibleStatus(log.status)) {
                        counts[log.storeId] = (counts[log.storeId] || 0) + 1; 
                    }
                });
                const incompleteIds = Object.keys(counts).filter(id => counts[id] === 1);
                return incompleteIds.map(id => {
                    const store = database.find(s => s.id === id && s.country === activeCountry);
                    if (!store) return null;
                    return { id, naam: store.naam, count: counts[id] };
                }).filter(s => s !== null).sort((a, b) => parseInt(a.id) - parseInt(b.id));
            };

            const incompleteStores = getIncompleteStores();
            const fullStores = getFullStores();
            const uniqueTrailers = getUniqueTrailers();

            const themeClass = activeCountry === 'NL' ? 'bg-nl-orange text-white' : 'bg-be-green text-white';
            const themeText = activeCountry === 'NL' ? 'text-nl-orange' : 'text-be-green';
            const themeBorder = activeCountry === 'NL' ? 'border-nl-orange' : 'border-be-green';

            const filteredScanHistory = scanHistory.filter(item => {
                if (item.country !== activeCountry) return false;
                if (activeCountry === 'NL' && item.depot !== activeDepot) return false;
                if ((item.source || 'MAIN') !== locationMode) return false;
                if (!isVisibleStatus(item.status)) return false;
                
                if (historySearchQuery) {
                    const q = historySearchQuery.toLowerCase();
                    const matches = 
                        String(item.storeId || '').includes(q) || 
                        String(item.storeName || '').toLowerCase().includes(q) || 
                        String(item.barcode || '').includes(q);
                    
                    if (!matches) return false;
                }
                
                if (historyTrailerFilter !== 'all') {
                    if (String(item.trailerNr) !== String(historyTrailerFilter)) return false;
                }

                if (historyDockFilter !== 'all') {
                    if (String(item.dock) !== String(historyDockFilter)) return false;
                }

                return true;
            });
            
            const bufferStats = getBufferStats();
            const displayedHistory = filteredScanHistory.slice(0, 100);

            const totalOpenSlots = getDailyStats().reduce((acc, stat) => {
                if(stat.store.blocked) return acc;
                const left = Math.max(0, (stat.store.max || 0) - stat.total);
                return acc + left;
            }, 0);
              const currentTargetKey = activeCountry === 'NL' ? activeDepot : 'BE';
            const remainingTrucks = truckTargets ? (truckTargets[currentTargetKey] || 0) : 0;
               return (
                <div className="min-h-screen bg-gray-100 p-4 font-sans text-slate-800">
                    
                    {/* GLOBAL MODALS */}
                    {uiMessage.open && (
                        <Modal title={uiMessage.title} onClose={() => setUiMessage({ ...uiMessage, open: false })}>
                            <p className="whitespace-pre-line">{uiMessage.message}</p>
                            <div className="flex justify-end mt-4">
                                <button onClick={() => setUiMessage({ ...uiMessage, open: false })} className={`px-4 py-2 rounded font-bold ${themeClass}`}>OK</button>
                            </div>
                        </Modal>
                    )}

                    {uiConfirm.open && (
                        <Modal title={uiConfirm.title} onClose={uiConfirm.onCancel}>
                            <p className="mb-4">{uiConfirm.message}</p>
                            <div className="flex justify-end gap-2">
                                <button onClick={uiConfirm.onCancel} className="px-4 py-2 border rounded hover:bg-gray-50">{uiConfirm.cancelLabel}</button>
                                <button onClick={uiConfirm.onConfirm} className={`px-4 py-2 rounded font-bold ${themeClass}`}>{uiConfirm.confirmLabel}</button>
                            </div>
                        </Modal>
                    )}
                  
                    {/* IMPORT DECISION MODAL */}
                    {importDecision.open && (
                        <Modal title="Import Keuze" onClose={() => setImportDecision({ ...importDecision, open: false })}>
                            <div className="text-center">
                                <div className="text-orange-500 mb-4 mx-auto flex justify-center">{Icons.Alert}</div>
                                <h3 className="font-bold text-lg mb-2">Er is al data aanwezig voor {importDecision.targetCountry}</h3>
                                <p className="text-gray-600 mb-6">Je staat op het punt om <b>{importDecision.barcodes.length}</b> nieuwe regels te importeren. Wat wil je doen?</p>
                                
                                <div className="flex flex-col gap-3">
                                    <button 
                                        onClick={() => executeImport(importDecision.barcodes, false, importDecision.targetCountry)}
                                        className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow hover:bg-blue-700 flex justify-center gap-2"
                                    >
                                        {Icons.Plus} Toevoegen aan bestaande lijst
                                    </button>
                                    
                                    <div className="text-xs text-gray-400 text-center">- OF -</div>

                                    <button 
                                        onClick={() => executeImport(importDecision.barcodes, true, importDecision.targetCountry)}
                                        className="w-full bg-white text-red-600 border-2 border-red-100 py-3 rounded-lg font-bold hover:bg-red-50 hover:border-red-200 flex justify-center gap-2"
                                    >
                                        {Icons.Trash} Alles wissen & Vervangen
                                    </button>
                                </div>
                                <button onClick={() => setImportDecision({ ...importDecision, open: false })} className="mt-4 text-gray-400 text-sm underline hover:text-gray-600">Annuleren</button>
                            </div>
                        </Modal>
                    )}

                    {/* BUFFER MANAGEMENT MODAL */}
                    {showBufferModal && (
                        <Modal title="Buffer Beheer" onClose={() => setShowBufferModal(false)} wide>
                            <div className="grid grid-cols-3 gap-4 mb-6">
                                <div className="bg-blue-50 p-4 rounded-lg text-center border border-blue-200">
                                    <div className="text-sm text-gray-500 font-bold">BE</div>
                                    <div className="text-3xl font-black text-blue-600">{bufferStats.counts.BE}</div>
                                </div>
                                <div className="bg-orange-50 p-4 rounded-lg text-center border border-orange-200">
                                    <div className="text-sm text-gray-500 font-bold">NL - TLB</div>
                                    <div className="text-3xl font-black text-orange-600">{bufferStats.counts.TLB}</div>
                                </div>
                                <div className="bg-orange-50 p-4 rounded-lg text-center border border-orange-200">
                                    <div className="text-sm text-gray-500 font-bold">NL - BKR</div>
                                    <div className="text-3xl font-black text-orange-600">{bufferStats.counts.BKR}</div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                <div className="border rounded bg-gray-50 p-2 h-64 overflow-y-auto custom-scroll">
                                    <h4 className="font-bold text-center text-blue-800 border-b pb-2 mb-2 sticky top-0 bg-gray-50">BE Items</h4>
                                    {bufferStats.lists.BE.map(item => (
                                        <div key={item.id} className="text-xs border-b border-gray-200 py-1 flex justify-between items-center hover:bg-red-50 transition group">
                                            <span className="font-mono text-gray-700">{item.barcode}</span>
                                            <button onClick={() => removeFromBuffer(item.id)} className="text-gray-300 hover:text-red-600 hover:bg-red-100 p-1 rounded transition" title="Verwijder">{Icons.Trash}</button>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="border rounded bg-gray-50 p-2 h-64 overflow-y-auto custom-scroll">
                                    <h4 className="font-bold text-center text-orange-800 border-b pb-2 mb-2 sticky top-0 bg-gray-50">TLB Items</h4>
                                    {bufferStats.lists.TLB.map(item => (
                                        <div key={item.id} className="text-xs border-b border-gray-200 py-1 flex justify-between items-center hover:bg-red-50 transition group">
                                            <span className="font-mono text-gray-700">{item.barcode}</span>
                                            <button onClick={() => removeFromBuffer(item.id)} className="text-gray-300 hover:text-red-600 hover:bg-red-100 p-1 rounded transition" title="Verwijder">{Icons.Trash}</button>
                                        </div>
                                    ))}
                                </div>

                                <div className="border rounded bg-gray-50 p-2 h-64 overflow-y-auto custom-scroll">
                                    <h4 className="font-bold text-center text-orange-800 border-b pb-2 mb-2 sticky top-0 bg-gray-50">BKR Items</h4>
                                    {bufferStats.lists.BKR.map(item => (
                                        <div key={item.id} className="text-xs border-b border-gray-200 py-1 flex justify-between items-center hover:bg-red-50 transition group">
                                            <span className="font-mono text-gray-700">{item.barcode}</span>
                                            <button onClick={() => removeFromBuffer(item.id)} className="text-gray-300 hover:text-red-600 hover:bg-red-100 p-1 rounded transition" title="Verwijder">{Icons.Trash}</button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-4 border-t pt-4">
                                <div className="w-1/3 p-4 bg-gray-50 rounded border border-gray-200 flex flex-col justify-between">
                                    <div>
                                        <h3 className="font-bold text-sm mb-1">Buffer Exporteren</h3>
                                        <div className="text-xs text-gray-500 mb-3">Download lijst als .txt</div>
                                    </div>
                                    <button onClick={exportBuffer} className="w-full bg-gray-600 text-white py-2 rounded text-sm font-bold flex items-center justify-center gap-2 hover:bg-gray-700">
                                        {Icons.Download} Download .txt
                                    </button>
                                </div>
                                
                                <div className="w-2/3 p-4 bg-blue-50 rounded border border-blue-200 flex flex-col">
                                    <h3 className="font-bold text-sm mb-2 text-blue-900">Barcodes Toevoegen</h3>
                                    <div className="text-xs text-blue-700 mb-2">
                                        <b>Doel:</b> {activeCountry} {activeCountry === 'NL' ? activeDepot : ''}<br/>
                                        (Slaat volledige barcode op, toont ID uit pos 4-6)
                                    </div>
                                    
                                    <textarea
                                        className="flex-1 border border-blue-200 p-2 text-xs font-mono rounded mb-2 focus:ring-2 ring-blue-500 outline-none resize-none h-24 bg-white"
                                        placeholder="Plak hier je lijst... (Bijv: 210062001)"
                                        value={bufferImportText}
                                        onChange={(e) => setBufferImportText(e.target.value)}
                                    />
                                    
                                    <button 
                                        onClick={processBufferImport}
